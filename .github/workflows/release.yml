name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.tag || github.ref }}

    - name: Check Bash syntax
      run: |
        set -euo pipefail
        for file in shipnode lib/*.sh lib/commands/*.sh build.sh build-dist.sh install.sh uninstall.sh scripts/*.sh; do
          bash -n "$file"
        done

    - name: Install ShellCheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck

    - name: Run ShellCheck errors
      run: |
        shellcheck --severity=error shipnode lib/*.sh lib/commands/*.sh build.sh build-dist.sh install.sh uninstall.sh scripts/*.sh

    - name: Report ShellCheck warnings
      continue-on-error: true
      run: |
        shellcheck --severity=warning shipnode lib/*.sh lib/commands/*.sh build.sh build-dist.sh install.sh uninstall.sh scripts/*.sh

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Run local integration tests
      run: make test-integration-local

    - name: Build distribution
      run: |
        chmod +x build-dist.sh
        ./build-dist.sh

    - name: Smoke test installer
      run: |
        set -euo pipefail
        export HOME="$RUNNER_TEMP/shipnode-home"
        mkdir -p "$HOME"
        bash dist/shipnode-installer.sh --non-interactive
        "$HOME/.shipnode/shipnode" help

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/shipnode-installer.sh
        generate_release_notes: true
        tag_name: ${{ github.event.inputs.tag || github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
