name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    name: Shell checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Bash syntax
        run: |
          set -euo pipefail
          for file in shipnode lib/*.sh lib/commands/*.sh build.sh build-dist.sh install.sh uninstall.sh scripts/*.sh; do
            bash -n "$file"
          done

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck errors
        run: |
          shellcheck --severity=error shipnode lib/*.sh lib/commands/*.sh build.sh build-dist.sh install.sh uninstall.sh scripts/*.sh

      - name: Report ShellCheck warnings
        continue-on-error: true
        run: |
          shellcheck --severity=warning shipnode lib/*.sh lib/commands/*.sh build.sh build-dist.sh install.sh uninstall.sh scripts/*.sh

  integration:
    name: Local integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run local integration tests
        run: make test-integration-local

  installer:
    name: Installer smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build distribution
        run: ./build-dist.sh

      - name: Install from generated installer
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/shipnode-home"
          mkdir -p "$HOME"
          bash dist/shipnode-installer.sh --non-interactive
          "$HOME/.shipnode/shipnode" help

  website:
    name: Website build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build
